<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- Hamburger (mobile only) -->
  <button id="hamburger" class="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile drawer -->
  <div id="mobile-drawer">
    <ul class="nav-links" id="mobile-nav-links"></ul>
    <div class="language-switcher" id="mobile-language-switcher"></div>
  </div>

  <!-- Page grid -->
  <div id="page">

    <!-- Left column -->
    <aside id="left-col">
      <div class="profile-photo">
        <img src="assets/photo.png" alt="Profile Photo" onerror="this.style.display='none'">
      </div>
      <div class="left-card">
        <h1 class="profile-name" id="profile-name"></h1>
        <ul class="contact-list" id="contact-list"></ul>
      </div>
    </aside>

    <!-- Right column -->
    <div id="right-col">

      <!-- Sticky top nav (desktop only) -->
      <nav id="top-nav">
        <ul class="nav-links" id="nav-links"></ul>
        <div class="language-switcher" id="language-switcher"></div>
      </nav>

      <!-- Summary -->
      <section id="summary-section" class="section">
        <div class="subsection-nav">
          <button class="subsection-tab active" data-target="summary" data-label-key="summary">Summary</button>
        </div>
        <div id="summary" class="subsection active">
          <p id="summary-text"></p>
        </div>
      </section>

      <!-- Skills / Languages / Certifications -->
      <section id="expertise" class="section">
        <div class="subsection-nav">
          <button class="subsection-tab active" data-target="skills-technical" data-label-key="skills_technical">Technical</button>
          <button class="subsection-tab" data-target="skills-soft" data-label-key="skills_soft">Soft Skills</button>
          <button class="subsection-tab" data-target="languages" data-label-key="languages">Languages</button>
          <button class="subsection-tab" data-target="certifications" data-label-key="certifications">Certifications</button>
        </div>
        <div id="skills-technical" class="subsection active">
          <div id="skills-grid-technical" class="skills-grid"></div>
        </div>
        <div id="skills-soft" class="subsection">
          <div id="skills-grid-soft"></div>
        </div>
        <div id="languages" class="subsection">
          <div id="languages-grid"></div>
        </div>
        <div id="certifications" class="subsection">
          <div id="certifications-grid"></div>
        </div>
      </section>

      <!-- Experience / Education / Projects -->
      <section id="history" class="section">
        <div class="subsection-nav">
          <button class="subsection-tab active" data-target="experience" data-label-key="experience">
            Experience <span id="experience-count" class="tab-badge"></span>
          </button>
          <button class="subsection-tab" data-target="education" data-label-key="education">Education</button>
          <button class="subsection-tab" data-target="projects" data-label-key="projects">Projects</button>
        </div>
        <div id="experience" class="subsection active">
          <div id="experience-timeline"></div>
        </div>
        <div id="education" class="subsection">
          <div id="education-grid"></div>
        </div>
        <div id="projects" class="subsection">
          <div id="projects-list"></div>
        </div>
      </section>

      <footer>
        <span id="footer-text"></span>
      </footer>

    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="assets/js/state.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/loader.js"></script>
    <script src="assets/js/background.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/tabs.js"></script>
    <script src="assets/js/builders.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
