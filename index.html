<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- Hamburger (mobile only) -->
  <button id="hamburger" class="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Mobile drawer -->
  <div id="mobile-drawer">
    <ul class="nav-links" id="mobile-nav-links"></ul>
    <div class="language-switcher" id="mobile-language-switcher"></div>
  </div>

  <!-- Page grid -->
  <div id="page">

    <!-- Left column -->
    <aside id="left-col">
      <div class="profile-photo">
        <img src="assets/photo.png" alt="Profile Photo" onerror="this.style.display='none'">
      </div>
      <div class="left-card">
        <h1 class="profile-name" id="profile-name"></h1>
        <ul class="contact-list" id="contact-list"></ul>
      </div>
    </aside>

    <!-- Right column -->
    <div id="right-col">

      <!-- Sticky top nav (desktop only) -->
      <nav id="top-nav">
        <ul class="nav-links" id="nav-links"></ul>
        <div class="language-switcher" id="language-switcher"></div>
      </nav>

      <!-- Summary — always visible -->
      <section id="summary-section" class="section">
        <h2 class="section-title">Summary</h2>
        <p id="summary-text"></p>
      </section>

      <!-- Skills Technical -->
      <section id="skills-technical" class="section" data-nav-section>
        <h2 class="section-title" id="skills-technical-title"></h2>
        <div id="skills-grid-technical" class="skills-grid"></div>
      </section>

      <!-- Skills Soft -->
      <section id="skills-soft" class="section" data-nav-section>
        <h2 class="section-title" id="skills-soft-title"></h2>
        <div id="skills-grid-soft"></div>
      </section>

      <!-- Languages -->
      <section id="languages-section" class="section" data-nav-section>
        <h2 class="section-title" id="languages-title"></h2>
        <div id="languages-grid"></div>
      </section>

      <!-- Certifications -->
      <section id="certifications-section" class="section" data-nav-section>
        <h2 class="section-title" id="certifications-title"></h2>
        <div id="certifications-grid"></div>
      </section>

      <!-- Experience -->
      <section id="experience-section" class="section" data-nav-section>
        <h2 class="section-title" id="experience-title"></h2>
        <div id="experience-timeline"></div>
      </section>

      <!-- Education -->
      <section id="education-section" class="section" data-nav-section>
        <h2 class="section-title" id="education-title"></h2>
        <div id="education-grid"></div>
      </section>

      <!-- Projects -->
      <section id="projects-section" class="section" data-nav-section>
        <h2 class="section-title" id="projects-title"></h2>
        <div id="projects-list"></div>
      </section>

      <footer>
        <span id="footer-text"></span>
      </footer>

    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="assets/js/state.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/loader.js"></script>
    <script src="assets/js/background.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/tabs.js"></script>
    <script src="assets/js/builders.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
