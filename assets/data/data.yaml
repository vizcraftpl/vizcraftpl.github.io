professional_summary:
  en: >
    Data-driven professional with 10+ years of experience improving operational performance through analytics, automation, and workforce optimization. Skilled in SQL, Power BI and cloud-based data solutions, with a strong track record of streamlining reporting, reducing manual workload, and enabling smarter decision‑making. Strong background in workforce planning and capacity analytics, combining technical expertise with leadership experience in high-volume contact center environments, driving efficiency, resource optimization, and continuous improvement across teams and processes.

  pl: >
    Ekspert w dziedzinie analizy danych z ponad 10-letnim doświadczeniem w optymalizacji wydajności operacyjnej poprzez analitykę, automatyzację i zarządzanie zasobami ludzkimi. Specjalizuję się w SQL, Power BI oraz rozwiązaniach chmurowych. Posiadam udokumentowane sukcesy w usprawnianiu raportowania, redukcji pracy manualnej i wspieraniu podejmowania trafnych decyzji biznesowych. Wywodzę się z obszaru planowania zasobów (Workforce Management) i analizy wydajności, łącząc kompetencje techniczne z doświadczeniem lidera w środowiskach contact center o dużej skali operacji.